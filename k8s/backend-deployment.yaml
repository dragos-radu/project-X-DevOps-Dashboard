apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: devops-dashboard-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_HOST
              value: database
            - name: POSTGRES_PORT
              value: "5432"
          envFrom:
            - secretRef:
                name: database-secret