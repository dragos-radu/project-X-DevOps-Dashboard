services:
  backend:
    build:
      context: ./backend
    image: devops-dashboard-backend:local
    container_name: devops-dashboard-backend
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-devops_dashboard}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_HOST: "database"
      POSTGRES_PORT: "5432"
      ICLOUD_USERNAME: "${ICLOUD_USERNAME:?ICLOUD_USERNAME is required}"
      ICLOUD_APP_PASSWORD: "${ICLOUD_APP_PASSWORD:?ICLOUD_APP_PASSWORD is required}"
    ports:
      - "8001:8000"
    depends_on:
      - database

  database:
    image: postgres:16
    container_name: devops-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-devops_dashboard}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    ports:
      - "5432:5432"
    volumes:
      - devops_dashboard_db_data:/var/lib/postgresql/data

volumes:
  devops_dashboard_db_data:
